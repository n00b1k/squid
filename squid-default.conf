#################################
# Network hardening
#################################

acl localnet src 10.0.0.0/8     # RFC 1918 local private network (LAN)
acl localnet src 100.64.0.0/10      # RFC 6598 shared address space (CGN)
acl localnet src 169.254.0.0/16     # RFC 3927 link-local (directly plugged) machines
acl localnet src 172.16.0.0/12      # RFC 1918 local private network (LAN)
acl localnet src 192.168.0.0/16     # RFC 1918 local private network (LAN)
acl localnet src fc00::/7           # RFC 4193 local private network range
acl localnet src fe80::/10          # RFC 4291 link-local (directly plugged) machines
acl localhost src 127.0.0.1/32 ::1

#################################
# Authentication
#################################

auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/internet_users
auth_param basic children 10
auth_param basic realm Secure Proxy
auth_param basic credentialsttl 24 hours

acl authenticated proxy_auth REQUIRED

#################################
# Block list
#################################

acl blocked_sites dstdomain "/etc/squid/blocked_sites"

#################################
# Security headers / privacy
#################################

via off
forwarded_for delete
request_header_access X-Forwarded-For deny all

#################################
# Access rules (order matters!)
#################################

http_access allow localhost manager
http_access allow authenticated manager
http_access deny manager

http_access deny blocked_sites
http_access allow authenticated localnet
http_access deny all

#################################
# Logging
#################################

access_log /var/log/squid/access.log

#################################
# Cache disabled
#################################

cache deny all

#################################
# Port
#################################

http_port 3128
https_port 3129 cert=/etc/squid/cert.pem key=/etc/squid/key.pem
visible_hostname proxy